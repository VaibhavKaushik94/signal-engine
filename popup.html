<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; width: 280px; padding: 15px; background: #0f172a; color: #f8fafc; margin: 0; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 12px; margin-bottom: 15px; }
    .header h3 { margin: 0; font-size: 16px; }
    
    #power-btn { padding: 6px 12px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; font-size: 12px; transition: all 0.2s; }
    #power-btn.on { background: #ef4444; color: white; }
    #power-btn.off { background: #10b981; color: white; }

    .mode-btn { display: block; width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #cbd5e1; cursor: pointer; text-align: left; transition: all 0.2s; }
    .mode-btn:hover { background: #334155; }
    .mode-btn.active { background: #10b981; color: #fff; border-color: #059669; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
    .mode-title { font-weight: 600; font-size: 14px; display: block; }
    .mode-desc { font-size: 11px; color: #94a3b8; display: block; margin-top: 4px; line-height: 1.3; }

    /* NEW: Custom Input Styles */
    #custom-container { display: none; margin-top: 10px; background: #1e293b; padding: 10px; border-radius: 6px; border: 1px solid #334155; }
    #custom-container.visible { display: block; }
    #custom-prompt { width: 100%; height: 80px; background: #0f172a; border: 1px solid #334155; color: #f8fafc; padding: 8px; border-radius: 4px; font-size: 12px; resize: none; box-sizing: border-box; margin-bottom: 8px; font-family: inherit;}
    #save-custom-btn { width: 100%; background: #3b82f6; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: 600; transition: background 0.2s;}
    #save-custom-btn:hover { background: #2563eb; }

    #status-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; background: #1e293b; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid #334155; }
    .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .online .status-dot { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
    .offline .status-dot { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }
    .online { color: #10b981; }
    .offline { color: #ef4444; }
  </style>
</head>
<body>
  
  <div class="header">
    <h3>Feed Filter</h3>
    <button id="power-btn" class="on">Turn OFF</button>
  </div>

  <div id="status-container" class="offline">
    <div><span class="status-dot"></span><span id="status-text">Checking Local AI...</span></div>
  </div>
  
  <button class="mode-btn" data-mode="software">
    <span class="mode-title">Software & Cyber</span>
  </button>
  
  <button class="mode-btn" data-mode="finance">
    <span class="mode-title">Finance & Markets</span>
  </button>

  <button class="mode-btn" data-mode="custom">
    <span class="mode-title"> Custom Filter</span>
    <span class="mode-desc">Define your own rules.</span>
  </button>

  <div id="custom-container">
    <textarea id="custom-prompt" placeholder="E.g., I only want to see posts about Java Spring Boot, Raspberry Pi builds, or AI startups..."></textarea>
    <button id="save-custom-btn">Save & Apply</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
